---
name: Pull Request

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  frontend:
    name: Check Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: ./MedLog/frontend
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: oven-sh/setup-bun@v2.0.2
      - uses: actions/cache@v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install
      - run: bun lint
