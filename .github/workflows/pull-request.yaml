---
name: Pull Request

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  frontend:
    name: Check Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: ./MedLog/frontend
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: oven-sh/setup-bun@v2.0.2
      - run: bun install
      - run: bun lint
